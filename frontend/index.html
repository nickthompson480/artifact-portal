<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <!-- Sync theme read BEFORE React renders — prevents light/dark flash on load -->
  <script>
    try {
      var ui = JSON.parse(localStorage.getItem('artifact-portal:ui') || '{}');
      if (ui.theme) document.documentElement.setAttribute('data-theme', ui.theme);
    } catch (_) {}
  </script>
  <title>Artifact Portal</title>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
